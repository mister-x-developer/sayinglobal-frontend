<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>Internet aloqasi yo'q</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container { text-align: center; max-width: 320px; }
    .icon { font-size: 64px; margin-bottom: 24px; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4)); }
    h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; margin-bottom: 12px; }
    p { font-size: 15px; color: #94a3b8; line-height: 1.6; margin-bottom: 32px; }
    button {
      background: #10b981;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      transition: all 0.2s;
    }
    button:active { transform: scale(0.96); background: #059669; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📶</div>
    <h1>Internet bilan aloqa yo'q</h1>
    <p>Ilovani ochish uchun internet ulanishi kerak. Iltimos, Wi-Fi yoki mobil internet yoqilganligini tekshiring.</p>
    <button onclick="window.location.replace('https://sayinglobal.vercel.app')">Qayta urinish</button>
  </div>
</body>
</html>
